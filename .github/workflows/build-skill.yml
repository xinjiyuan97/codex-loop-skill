name: Build Codex Loop Skill

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macos-aarch64
            bin_name: codex-mcp-server
          - platform: macos-latest
            target: x86_64-apple-darwin
            os_name: macos-x86_64
            bin_name: codex-mcp-server
          - platform: ubuntu-latest
            target: ""
            os_name: linux-x86_64
            bin_name: codex-mcp-server
          - platform: windows-latest
            target: ""
            os_name: windows-x86_64
            bin_name: codex-mcp-server.exe

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add "${{ matrix.target }}"

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --locked --target "${{ matrix.target }}"
            echo "bin_path=target/${{ matrix.target }}/release/${{ matrix.bin_name }}" >> "$GITHUB_ENV"
          else
            cargo build --release --locked
            echo "bin_path=target/release/${{ matrix.bin_name }}" >> "$GITHUB_ENV"
          fi

      - name: Package skill
        run: |
          chmod +x scripts/package-skill.sh
          ./scripts/package-skill.sh "${{ matrix.os_name }}" "$bin_path" dist

      - name: Upload skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-loop-${{ matrix.os_name }}
          if-no-files-found: error
          path: dist/codex-loop-${{ matrix.os_name }}.skill
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download all skill artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: codex-loop-*
          merge-multiple: true

      - name: List release assets
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*.skill
